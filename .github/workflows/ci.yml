name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (iOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      # Config.xcconfig holds API keys and is gitignored, so CI builds from the
      # template. Every source degrades gracefully without a key, and the
      # engine tests don't hit the network.
      - name: Create config from template
        run: cp Config.xcconfig.template Config.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available --json \
            | python3 -c 'import sys,json;d=json.load(sys.stdin)["devices"];print(next(x["name"] for r in d.values() for x in r if x["name"].startswith("iPhone")))')
          echo "Using simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project SkyWarden.xcodeproj \
            -scheme SkyWarden \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
