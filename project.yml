name: SkyWarden

options:
  bundleIdPrefix: com.defranceski
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

# API keys / secrets come from Config.xcconfig (gitignored). Keys defined there
# become build settings, which Info.plist references via $(KEY) substitution.
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGN_STYLE: Automatic
    # Baked in so regenerating the project never wipes your signing team.
    DEVELOPMENT_TEAM: L9SAXP2E2W
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"

targets:
  SkyWarden:
    type: application
    platform: iOS
    sources:
      # The existing data + view layer. The Watch complication (ClockKit,
      # watchOS-only) and the Config templates are excluded from the iOS app.
      - path: SkyWarden-handover/SkyWarden-iOS
        excludes:
          - "WatchApp/**"    # ClockKit is watchOS-only
          - "Config/**"      # templates and notes, not code
          # Unused REST reference. It imports CryptoKit (P256 JWT signing); keeping
          # it out of the binary means the app ships no cryptography beyond HTTPS,
          # which keeps the export-compliance answer unambiguous.
          - "Reference/**"
      - path: Support/iOS/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.defranceski.skywarden
        INFOPLIST_FILE: Support/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: Support/iOS/SkyWarden.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone-only (portrait app; avoids the iPad all-orientations rule)

  SkyWardenTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: SkyWarden
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.defranceski.skywarden.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  SkyWarden:
    build:
      targets:
        SkyWarden: all
        SkyWardenTests: [test]
    test:
      targets: [SkyWardenTests]
    run:
      config: Debug
